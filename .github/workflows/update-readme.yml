name: Update README

on:
  workflow_dispatch:
  schedule:
    - cron: "0 2 * * *"

permissions:
  contents: write

jobs:
  update-readme:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Validate script
        run: python3 -m py_compile scripts/scan_plugins.py

      - name: Regenerate reports
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: python3 scripts/scan_plugins.py

      - name: Commit updated reports
        run: |
          if git diff --quiet -- README.md report.json; then
            echo "No report changes"
            exit 0
          fi

          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add README.md report.json
          git commit -m "chore: update suspicious plugin reports"
          git push
